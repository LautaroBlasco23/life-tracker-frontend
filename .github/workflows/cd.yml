name: CD

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, homeserver, frontend]
    steps:
      - name: Deploy frontend service
        run: ~/deploy/infra/scripts/deploy-service.sh frontend

      - name: Health check
        run: |
          sleep 5
          curl -f http://frontend:3000 || curl -f http://nginx/health || exit 1
