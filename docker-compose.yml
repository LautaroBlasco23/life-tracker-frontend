version: '3.8'

services:
  nextjs-app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: https://api-lifetracker.lautaroblasco.com/api
    container_name: nextjs-app
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
